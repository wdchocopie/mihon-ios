# XcodeGen manifest. The iOS .app target cannot be an SPM target, and you cannot
# open Xcode to maintain a .xcodeproj — so the project is GENERATED from this
# file on the CI runner (`xcodegen generate`) and the .xcodeproj is gitignored.
# Edit THIS file, never a generated .xcodeproj.
name: Mihon
options:
  bundleIdPrefix: app.mihon.ios
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  # The local SPM package at the repo root supplies the library modules.
  Mihon:
    path: .

targets:
  Mihon:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    dependencies:
      - package: Mihon
        product: MihonUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.mihon.ios
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad — iPad is a first-class target
        CODE_SIGN_STYLE: Manual
