# iOS build + sign + TestFlight, on a free macOS runner. NO Mac required.
#
# Verified path (plan "Verified July 2026" section): signing is done by fastlane
# match driven by an App Store Connect API key — no local CSR, no Keychain
# Access, no Mac. This runs manually (workflow_dispatch) so it never auto-fails
# before the secrets below are configured. Flip it to `push: [main]` once green.
#
# ── One-time setup (all doable from Windows) ─────────────────────────────────
# 1. App Store Connect ▸ Users and Access ▸ Integrations ▸ Team Keys:
#    create a key with role = ADMIN (App Manager CANNOT manage certificates).
#    Download AuthKey_XXXX.p8 once.
# 2. Create a PRIVATE repo to hold the match certificate store (keep it private
#    even though THIS repo is public).
# 3. Add these GitHub repository SECRETS:
#      ASC_KEY_ID            - the key's ID
#      ASC_ISSUER_ID         - the issuer ID
#      ASC_KEY_P8_BASE64     - base64 of the .p8 file contents
#      MATCH_PASSWORD        - passphrase encrypting the match store
#      MATCH_GIT_URL         - https URL of the private certs repo
#      MATCH_GIT_BASIC_AUTH  - base64 of "username:personal_access_token"
# 4. First run only: run `fastlane match appstore` (writable) once to populate
#    the store, then this workflow uses it read-only. See fastlane/README.
name: ios-build

on:
  workflow_dispatch:

jobs:
  testflight:
    name: Build & upload to TestFlight
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Decode ASC API key
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p fastlane/private_keys
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > fastlane/private_keys/AuthKey.p8

      - name: Build & upload
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTH }}
        run: bundle exec fastlane beta
